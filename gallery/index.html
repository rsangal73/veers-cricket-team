<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery | Veers Cricket Team</title>
  <meta name="description" content="Photos from Veers Cricket Team matches and get-togethers — West Windsor, NJ.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://veerscricket.com/gallery/">
  <link rel="icon" type="image/png" href="https://veerscricket.com/logo.png">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Veers Cricket Team">
  <meta property="og:title" content="Gallery | Veers Cricket Team">
  <meta property="og:description" content="Photos from Veers Cricket Team matches and get-togethers — West Windsor, NJ.">
  <meta property="og:url" content="https://veerscricket.com/gallery/">
  <meta property="og:image" content="https://veerscricket.com/logo.png">

  <style>
    :root {
      color-scheme: dark;
      --bg: #070B14;
      --card: #121C2F;
      --card-2: #0A111E;
      --border: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.55);
      --accent: #3B82F6;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(20px);
      background: rgba(7,11,20,0.7);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 20px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand img {
      height: 40px;
      width: 40px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      object-fit: contain;
    }
    .brand-name {
      font-weight: 800;
      letter-spacing: 0.14em;
      font-size: 13px;
    }
    .brand-sub {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--muted);
      margin-top: 3px;
    }
    .back-link {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      padding: 8px 16px;
      border-radius: 999px;
      transition: background 0.15s;
    }
    .back-link:hover { background: rgba(255,255,255,0.08); }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.18em;
      font-weight: 600;
      color: var(--muted);
    }
    .eyebrow span {
      height: 1px;
      width: 24px;
      background: rgba(255,255,255,0.2);
    }
    h1 {
      margin: 12px 0 8px;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: var(--muted);
      font-size: 15px;
      max-width: 640px;
      margin: 0 0 40px;
    }

    .album-heading {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      margin: 40px 0 16px;
    }
    .album-heading:first-of-type { margin-top: 0; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .grid figure {
      margin: 0;
      cursor: pointer;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--card-2);
      aspect-ratio: 4 / 3;
    }
    .grid img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }
    .grid figure:hover img { transform: scale(1.04); }

    .empty-state {
      border-radius: 26px;
      border: 1px solid var(--border);
      background: linear-gradient(to bottom, rgba(18,28,47,0.9), rgba(10,17,30,0.9));
      padding: 48px 32px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(3,5,10,0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 100%;
      max-height: 82vh;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .lightbox-caption {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }
    .lightbox-close, .lightbox-prev, .lightbox-next {
      position: absolute;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      border-radius: 999px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
    }
    .lightbox-close { top: 20px; right: 20px; }
    .lightbox-prev { left: 20px; top: 50%; transform: translateY(-50%); }
    .lightbox-next { right: 20px; top: 50%; transform: translateY(-50%); }
    .lightbox-close:hover, .lightbox-prev:hover, .lightbox-next:hover { background: rgba(255,255,255,0.16); }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="brand" href="/">
        <img src="/logo.png" alt="Veers Cricket Team logo">
        <div>
          <div class="brand-name">VEERS CRICKET TEAM</div>
          <div class="brand-sub">WEST WINDSOR &bull; EST. 2020</div>
        </div>
      </a>
      <a class="back-link" href="/">&larr; Back to site</a>
    </div>
  </header>

  <main>
    <div class="eyebrow"><span></span> GALLERY</div>
    <h1>Match &amp; Team Photos</h1>
    <p class="subtitle">Moments from our matches, practices, and team get-togethers.</p>

    <div id="gallery-root"></div>
  </main>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-prev" id="lightbox-prev" aria-label="Previous">&#8249;</button>
    <img id="lightbox-img" src="" alt="">
    <div class="lightbox-caption" id="lightbox-caption"></div>
    <button class="lightbox-next" id="lightbox-next" aria-label="Next">&#8250;</button>
  </div>

  <script>
  (function () {
    var root = document.getElementById("gallery-root");
    var lightbox = document.getElementById("lightbox");
    var lightboxImg = document.getElementById("lightbox-img");
    var lightboxCaption = document.getElementById("lightbox-caption");
    var photos = [];
    var currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      var p = photos[currentIndex];
      lightboxImg.src = p.file;
      lightboxImg.alt = p.caption || "";
      lightboxCaption.textContent = p.caption || "";
      lightbox.classList.add("open");
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightboxImg.src = "";
    }

    function showRelative(delta) {
      if (!photos.length) return;
      currentIndex = (currentIndex + delta + photos.length) % photos.length;
      openLightbox(currentIndex);
    }

    document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
    document.getElementById("lightbox-prev").addEventListener("click", function () { showRelative(-1); });
    document.getElementById("lightbox-next").addEventListener("click", function () { showRelative(1); });
    lightbox.addEventListener("click", function (e) {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener("keydown", function (e) {
      if (!lightbox.classList.contains("open")) return;
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowLeft") showRelative(-1);
      if (e.key === "ArrowRight") showRelative(1);
    });

    function renderEmpty() {
      var div = document.createElement("div");
      div.className = "empty-state";
      div.textContent = "Photos coming soon — check back after our next match or get-together!";
      root.appendChild(div);
    }

    function renderPhotos(items) {
      var albums = [];
      var albumIndex = {};
      items.forEach(function (item) {
        var albumName = item.album || "Photos";
        if (!(albumName in albumIndex)) {
          albumIndex[albumName] = [];
          albums.push(albumName);
        }
        albumIndex[albumName].push(item);
      });

      albums.forEach(function (albumName) {
        if (albums.length > 1) {
          var heading = document.createElement("div");
          heading.className = "album-heading";
          heading.textContent = albumName;
          root.appendChild(heading);
        }
        var grid = document.createElement("div");
        grid.className = "grid";
        albumIndex[albumName].forEach(function (item) {
          var fig = document.createElement("figure");
          var img = document.createElement("img");
          img.src = item.thumb || item.file;
          img.alt = item.caption || "";
          img.loading = "lazy";
          fig.appendChild(img);
          fig.addEventListener("click", function () {
            openLightbox(photos.indexOf(item));
          });
          grid.appendChild(fig);
        });
        root.appendChild(grid);
      });
    }

    fetch("/gallery/manifest.json", { cache: "no-store" })
      .then(function (r) { return r.json(); })
      .then(function (items) {
        photos = items || [];
        if (!photos.length) {
          renderEmpty();
        } else {
          renderPhotos(photos);
        }
      })
      .catch(function () {
        renderEmpty();
      });
  })();
  </script>
</body>
</html>
